<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML 手機預覽器</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: #1e1e1e;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }
        /* 標題欄 */
        header {
            padding: 10px 15px;
            background: #333;
            font-size: 14px;
            font-weight: bold;
            flex-shrink: 0;
        }
        /* 編輯區：固定高度，不佔據太多空間 */
        .editor-container {
            height: 35%; /* 調整此百分比可改變輸入框大小 */
            position: relative;
            border-bottom: 2px solid #444;
        }
        textarea {
            width: 100%;
            height: 100%;
            padding: 12px;
            background: #282c34;
            color: #abb2bf;
            font-family: Menlo, Monaco, 'Courier New', monospace;
            font-size: 14px;
            border: none;
            outline: none;
            resize: none;
        }
        /* 預覽區：自動填滿剩餘空間 */
        .preview-container {
            flex: 1;
            background: #fff;
            position: relative;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }
        .label {
            position: absolute;
            top: 5px;
            right: 10px;
            background: rgba(0,0,0,0.3);
            color: #eee;
            padding: 2px 6px;
            font-size: 10px;
            border-radius: 4px;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

<header>HTML Mobile Previewer</header>

<div class="editor-container">
    <span class="label">EDITOR</span>
    <textarea id="code" spellcheck="false" placeholder="在此輸入程式碼..."></textarea>
</div>

<div class="preview-container">
    <span class="label" style="background: rgba(0,0,0,0.1); color: #666;">PREVIEW</span>
    <iframe id="preview"></iframe>
</div>

<script>
    const textarea = document.getElementById('code');
    const iframe = document.getElementById('preview');

    // 預設適合手機查看的範例內容
    const defaultCode = `<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: sans-serif; padding: 20px; color: #333; line-height: 1.6; }
    .card { border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); padding: 15px; background: #f9f9f9; }
    h2 { color: #ff4757; margin-top: 0; }
  </style>
</head>
<body>
  <div class="card">
    <h2>沖繩旅行備忘錄</h2>
    <p>這是在 iPhone X 上預覽的效果！</p>
    <ul>
      <li>MaxValu 牧志店</li>
      <li>美國村全日遊</li>
    </ul>
  </div>
</body>
</html>`;

    textarea.value = defaultCode;

    function updatePreview() {
        const doc = iframe.contentDocument || iframe.contentWindow.document;
        doc.open();
        doc.write(textarea.value);
        doc.close();
    }

    textarea.addEventListener('input', updatePreview);
    window.onload = updatePreview;
</script>

</body>
</html>
