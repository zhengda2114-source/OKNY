<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>子網路遮罩計算小幫手</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { color: #1a73e8; text-align: center; margin-bottom: 20px; }
        .input-section { margin-bottom: 20px; text-align: center; }
        .slash { font-size: 24px; font-weight: bold; color: #555; }
        input { width: 80px; padding: 10px; font-size: 20px; border: 2px solid #ddd; border-radius: 8px; text-align: center; outline: none; }
        input:focus { border-color: #1a73e8; }
        .result-area { background: #f8f9fa; border-left: 5px solid #1a73e8; padding: 15px; border-radius: 4px; margin-top: 20px; }
        .label { font-size: 0.9rem; color: #666; margin-bottom: 5px; }
        .value { font-size: 1.4rem; font-weight: bold; color: #d93025; font-family: monospace; }
        .formula-box { margin-top: 20px; padding-top: 15px; border-top: 1px solid #eee; }
        .step { background: #fffbe6; padding: 10px; border-radius: 5px; font-size: 0.95rem; line-height: 1.6; border: 1px dashed #ffe58f; }
        code { background: #eee; padding: 2px 5px; border-radius: 3px; font-family: monospace; }
    </style>
</head>
<body>

<div class="card">
    <h2>Mask 計算小幫手</h2>
    
    <div class="input-section">
        <span class="slash">/</span>
        <input type="number" id="cidr" value="26" min="0" max="32" oninput="runCalc()">
    </div>

    <div class="result-area">
        <div class="label">子網路遮罩 (Netmask)</div>
        <div id="maskVal" class="value">255.255.255.192</div>
    </div>

    <div class="formula-box">
        <div class="label">💡 本數值計算過程：</div>
        <div id="steps" class="step">
            </div>
    </div>
</div>

<script>
function runCalc() {
    let cidr = document.getElementById('cidr').value;
    if (cidr === "" || cidr < 0 || cidr > 32) return;

    // 1. 計算遮罩
    let mask = [];
    for (let i = 0; i < 4; i++) {
        let bits = Math.min(Math.max(cidr - i * 8, 0), 8);
        mask.push(256 - Math.pow(2, 8 - bits));
    }
    let maskStr = mask.join('.');
    document.getElementById('maskVal').innerText = maskStr;

    // 2. 產出對應的簡易公式說明
    let hostBits = 32 - cidr;
    let hosts = Math.max(Math.pow(2, hostBits) - 2, 0);
    
    let stepHtml = "";
    if (cidr >= 24) {
        let magicNum = Math.pow(2, 32 - cidr);
        stepHtml = `
            1. 算出剩餘主機位元：32 - <b>${cidr}</b> = <b>${hostBits}</b><br>
            2. 計算區段基數：2<sup>${hostBits}</sup> = <b>${magicNum}</b><br>
            3. 遮罩最後一碼：256 - ${magicNum} = <b>${mask[3]}</b><br>
            4. 可用主機：${magicNum} - 2 = <b>${hosts}</b>
        `;
    } else {
        stepHtml = `
            此為大範圍遮罩 (/${cidr})。<br>
            公式：每個 8 bits 全滿為 255。<br>
            當前計算：<code>${maskStr}</code>
        `;
    }
    document.getElementById('steps').innerHTML = stepHtml;
}

// 初始執行
runCalc();
</script>

</body>
</html>
